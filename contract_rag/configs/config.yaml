qdrant:
  url: http://localhost:6333
  collection_name: contracts
  vector_size: 512

embedding:
  model_name: BAAI/bge-large-en-v1.5
  batch_size: 32

reranker:
  model_name: BAAI/bge-reranker-v2-m3
  top_n: 5

retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  rerank_top_k: 5
  hybrid_alpha: 0.7

llm:
  base_url: http://localhost:11434
  model_name: mistral
  temperature: 0.1
  max_tokens: 2048

chunking:
  chunk_size: 512
  chunk_overlap: 64

data:
  raw_dir: contract_rag/data/raw
  processed_dir: contract_rag/data/processed
  cuad_sample_size: 50
