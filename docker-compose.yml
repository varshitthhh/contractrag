version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: contractrag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  contractrag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contractrag_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data: